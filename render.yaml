services:
  - type: web
    name: chess-ai-coach-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /
    envVars:
      - key: STOCKFISH_PATH
        value: /usr/games/stockfish
      - key: FRONTEND_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: AUTH_REQUIRED
        value: "true"
      - key: FREE_AI_REQUESTS
        value: "3"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: BILLING_SUCCESS_URL
        sync: false
      - key: BILLING_CANCEL_URL
        sync: false
